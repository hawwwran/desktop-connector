name: desktop-release

# Triggered by `desktop/v*` tag pushes (matches install.sh:107's tag
# convention and version.json's `desktop` field). manual workflow_dispatch
# is also wired up so we can dry-run the build off a non-tag commit
# without publishing — useful while iterating on the workflow itself.
#
# Plan: docs/plans/desktop-appimage-packaging-plan.md (P.5a). GPG
# signing + SOURCE_DATE_EPOCH reproducibility pin lands in P.5b.

on:
  push:
    tags:
      - 'desktop/v*'
  workflow_dispatch: {}  # manual trigger never publishes — see publish step's gate

permissions:
  contents: write  # required by softprops/action-gh-release to create the release

jobs:
  build:
    name: Build + publish AppImage
    # Plan called for ubuntu-22.04 (glibc 2.35 → wide-compat floor).
    # Targeting ubuntu-24.04 because libadwaita 1.5+ and
    # girepository-2.0 2.80+ ship in default apt there; on 22.04 we'd
    # need a fragile backport PPA. Coverage floor on 24.04: Zorin 17+,
    # Mint 22+, Pop! 24.04+, Debian 13+, Fedora 40+. Re-target 22.04
    # when a stable backport path is identified — see plan's "Risks +
    # mitigations" entry on the GTK4 bundling risk.
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # Full history so future P.5b can resolve the tag's commit
          # timestamp for SOURCE_DATE_EPOCH without a fetch hop.
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip \
            libgtk-4-dev libadwaita-1-dev \
            libgirepository-2.0-dev libgirepository1.0-dev \
            libwebkitgtk-6.0-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            libcairo2-dev \
            libfuse3-3 fuse3 \
            zsync \
            file desktop-file-utils \
            curl ca-certificates

      - name: Verify host has compatible GTK4 + libadwaita
        # Mirrors the pre-flight inside build-appimage.sh — fail fast with
        # a clear message instead of letting the script error mid-bundling.
        run: |
          set -e
          for pair in 'gtk4 4.10' 'libadwaita-1 1.5' 'girepository-2.0 2.80'; do
            pkg="${pair% *}"
            min="${pair#* }"
            got=$(pkg-config --modversion "$pkg")
            echo "$pkg: $got (need >= $min)"
            pkg-config --atleast-version="$min" "$pkg" || {
              echo "::error::host $pkg is $got but $min+ is required"; exit 1;
            }
          done

      - name: Verify tag matches version.json
        # Tag-triggered runs only — workflow_dispatch may run off a
        # non-tagged commit deliberately for smoke testing.
        if: github.ref_type == 'tag'
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF_NAME#desktop/v}"
          JSON_VERSION=$(python3 -c 'import json; print(json.load(open("version.json"))["desktop"])')
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} (=${TAG_VERSION}) does not match version.json desktop=${JSON_VERSION}. Bump version.json before tagging."
            exit 1
          fi
          echo "tag and version.json agree on ${TAG_VERSION}"

      - name: Pin SOURCE_DATE_EPOCH from commit timestamp
        # Reproducibility (P.5b): freezes mksquashfs / appimagetool
        # timestamps to the committer date, so re-running the workflow on
        # the same commit produces a byte-identical AppImage. appimagetool
        # and mksquashfs both honour SOURCE_DATE_EPOCH automatically when
        # set in the environment.
        run: |
          set -e
          SDE=$(git log -1 --pretty=%ct HEAD)
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH = ${SDE}  ($(date -u -d @${SDE}))"

      - name: Pin UPDATE_INFORMATION for in-app update
        # Embeds the zsync URL pattern into the AppImage's binary header
        # so the bundled `appimageupdatetool` (P.6b) knows where to fetch
        # the matching .zsync. Without this, "Install update" fails with
        # exit 2 ("Could not find update information").
        #
        # We point at a rolling `desktop-latest` GitHub Release rather
        # than the API's `latest` — AppImageUpdate's provider only
        # accepts literal tag values (no wildcards), and `latest` would
        # mix in `android/v*` releases (any newer android release would
        # shadow the desktop AppImage). The "Update rolling desktop-
        # latest release" step at the end of this workflow keeps that
        # rolling release pointed at this build's .zsync.
        run: |
          set -e
          echo "UPDATE_INFORMATION=gh-releases-zsync|hawwwran|desktop-connector|desktop-latest|desktop-connector-*-x86_64.AppImage.zsync" >> "$GITHUB_ENV"

      - name: Build AppImage
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/artefacts"
          ./desktop/packaging/appimage/build-appimage.sh \
            --source="$GITHUB_WORKSPACE" \
            --output="$GITHUB_WORKSPACE/artefacts"

      - name: Resolve version + apply versioned name
        id: artefact
        run: |
          set -e
          VERSION=$(python3 -c 'import json; print(json.load(open("version.json"))["desktop"])')
          OLD="$GITHUB_WORKSPACE/artefacts/desktop-connector-x86_64.AppImage"
          NEW_NAME="desktop-connector-${VERSION}-x86_64.AppImage"
          NEW="$GITHUB_WORKSPACE/artefacts/${NEW_NAME}"
          mv "$OLD" "$NEW"
          {
            echo "version=${VERSION}"
            echo "appimage_path=${NEW}"
            echo "appimage_name=${NEW_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Smoke test (--version)
        run: |
          set -e
          OUT=$("${{ steps.artefact.outputs.appimage_path }}" --version)
          echo "$OUT"
          # The output should mention the version we just stamped on the file.
          echo "$OUT" | grep -q "${{ steps.artefact.outputs.version }}"

      - name: Smoke test (--headless, 5s)
        # Boot the headless receiver, give it 5 s to survive past
        # bootstrap + register attempt, then SIGTERM. We just want to
        # confirm the AppImage runs end-to-end on this runner.
        run: |
          set +e
          "${{ steps.artefact.outputs.appimage_path }}" \
            --headless --config-dir=/tmp/dc-smoke &
          PID=$!
          sleep 5
          kill -TERM $PID 2>/dev/null
          wait $PID
          # Exit code is non-zero (registration fails against no relay,
          # or SIGTERM); only the "did the AppImage start running" check
          # matters here.
          echo "smoke ok"

      - name: Generate zsync delta metadata
        # Embeds the eventual download URL so AppImageUpdate can fetch
        # binary deltas instead of the full AppImage on update (P.6).
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/artefacts"
          ZSYNC_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${{ steps.artefact.outputs.appimage_name }}"
          zsyncmake -u "$ZSYNC_URL" "${{ steps.artefact.outputs.appimage_name }}"

      - name: Generate SHA256SUMS
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/artefacts"
          sha256sum \
            "${{ steps.artefact.outputs.appimage_name }}" \
            "${{ steps.artefact.outputs.appimage_name }}.zsync" \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Sign artefacts with release GPG key
        # Tag PUSH only. The signing key + passphrase live in repo secrets
        # (DESKTOP_SIGNING_KEY, DESKTOP_SIGNING_PASS) — see
        # docs/release/desktop-signing-recovery.md for the storage model.
        # Imports the secret key into a fresh, throwaway GNUPGHOME so it
        # doesn't pollute the runner's home, then produces detached binary
        # signatures over the AppImage and SHA256SUMS, then verifies them
        # against the public key shipped in the repo as a final sanity
        # check before publish.
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          DESKTOP_SIGNING_KEY: ${{ secrets.DESKTOP_SIGNING_KEY }}
          DESKTOP_SIGNING_PASS: ${{ secrets.DESKTOP_SIGNING_PASS }}
          EXPECTED_FP: FBEFCEC13D7AEC0810812975491C904390F4E03B
        run: |
          set -e
          if [ -z "${DESKTOP_SIGNING_KEY}" ] || [ -z "${DESKTOP_SIGNING_PASS}" ]; then
            echo "::error::DESKTOP_SIGNING_KEY / DESKTOP_SIGNING_PASS secrets are not set"
            exit 1
          fi

          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"

          # Import the secret key. --batch suppresses prompts; --no-tty
          # ensures GPG never tries to read from the (non-existent) tty.
          printf '%s' "${DESKTOP_SIGNING_KEY}" | gpg --batch --import

          FOUND=$(gpg --list-secret-keys --with-colons \
            | awk -F: '/^fpr:/ {print $10; exit}')
          if [ "${FOUND}" != "${EXPECTED_FP}" ]; then
            echo "::error::imported secret key fingerprint ${FOUND} does not match expected ${EXPECTED_FP}. Re-upload DESKTOP_SIGNING_KEY from the password manager."
            exit 1
          fi

          cd "$GITHUB_WORKSPACE/artefacts"
          APPIMAGE="${{ steps.artefact.outputs.appimage_name }}"

          gpg --pinentry-mode loopback --batch --yes \
              --passphrase "${DESKTOP_SIGNING_PASS}" \
              --local-user "${EXPECTED_FP}" \
              --detach-sign --output "${APPIMAGE}.sig" "${APPIMAGE}"
          gpg --pinentry-mode loopback --batch --yes \
              --passphrase "${DESKTOP_SIGNING_PASS}" \
              --local-user "${EXPECTED_FP}" \
              --detach-sign --output "SHA256SUMS.sig" "SHA256SUMS"

          # Independent verify: import the public key shipped in the
          # repo into a separate GNUPGHOME and check both signatures.
          # Catches the case where the secret key in the GitHub secret
          # has drifted from the public key in the repo.
          VERIFY_HOME="$(mktemp -d)"
          chmod 700 "$VERIFY_HOME"
          GNUPGHOME="$VERIFY_HOME" gpg --import \
            "$GITHUB_WORKSPACE/docs/release/desktop-signing.pub.asc"
          GNUPGHOME="$VERIFY_HOME" gpg --verify "${APPIMAGE}.sig" "${APPIMAGE}"
          GNUPGHOME="$VERIFY_HOME" gpg --verify "SHA256SUMS.sig" "SHA256SUMS"
          rm -rf "$VERIFY_HOME" "$GNUPGHOME"
          unset GNUPGHOME

      - name: Upload artefacts (manual / dry-run builds)
        # Anything that isn't a tag-push lands here — manual dispatch,
        # or a tag-push that failed before the publish step. The
        # AppImage becomes downloadable from the run summary instead.
        if: github.event_name != 'push' || github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-connector-${{ steps.artefact.outputs.version }}-x86_64
          path: |
            artefacts/desktop-connector-*-x86_64.AppImage
            artefacts/desktop-connector-*-x86_64.AppImage.zsync
            artefacts/SHA256SUMS
          if-no-files-found: error

      - name: Publish to GitHub Releases
        # Tag PUSH events only — workflow_dispatch dispatched against a
        # tag would also have ref_type=tag, which we explicitly do NOT
        # want to publish (manual runs are dry-runs by convention).
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artefacts/desktop-connector-*-x86_64.AppImage
            artefacts/desktop-connector-*-x86_64.AppImage.sig
            artefacts/desktop-connector-*-x86_64.AppImage.zsync
            artefacts/SHA256SUMS
            artefacts/SHA256SUMS.sig
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Update rolling desktop-latest release
        # Stream isolation for in-app updates. The embedded
        # UPDATE_INFORMATION points at the `desktop-latest` tag rather
        # than `latest` so a newer android/v* release can't shadow the
        # desktop update channel. We host only the .zsync (+ SHA256SUMS
        # for integrity reference) on this rolling release; the .zsync's
        # `URL:` header points back at the versioned release's AppImage,
        # so zsync2 still pulls the actual ~150 MB bytes from there.
        # Storage cost: ~150 KB extra per release.
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/artefacts"
          # Idempotent re-run: nuke the previous rolling release + its
          # tag so `gh release create` can plant both fresh at HEAD.
          # `|| true` covers the first-ever run (nothing to delete).
          gh release delete desktop-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create desktop-latest \
            --target "$GITHUB_SHA" \
            --title "Latest desktop release (${{ steps.artefact.outputs.version }})" \
            --notes "Rolling pointer to the most recent desktop release for the in-app updater. See [desktop/v${{ steps.artefact.outputs.version }}](https://github.com/${GITHUB_REPOSITORY}/releases/tag/desktop%2Fv${{ steps.artefact.outputs.version }}) for the changelog and full asset set (AppImage + .sig + SHA256SUMS). The .zsync attached here points back at that versioned AppImage." \
            "${{ steps.artefact.outputs.appimage_name }}.zsync" \
            SHA256SUMS \
            SHA256SUMS.sig
